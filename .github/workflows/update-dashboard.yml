name: Update Dashboard

on:
  schedule:
    - cron: "*/30 * * * *"   # runs every 30 minutes
  workflow_dispatch: {}       # lets you click "Run workflow" manually too

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate dashboard
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_OWNER: BrahmMeyer
          PROJECT_NUMBER: "1"
        run: node scripts/generate-dashboard.js

      - name: Commit and push if changed
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Auto-update dashboard"
          git pull --rebase origin main
          git push
